<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hussain Digital Studio - Official App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            background-color: #0e1117;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background 0.5s ease-in-out;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-image: url('https://images.unsplash.com/photo-1464802686167-b939a6910659');
        }
        .overlay {
            background: rgba(0, 0, 0, 0.6);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 242, 255, 0.3);
        }
        .neon-text {
            color: #00f2ff;
            text-shadow: 0 0 10px #00f2ff;
        }
    </style>
</head>
<body>

<div class="overlay w-full">
    <h1 class="text-3xl font-bold neon-text my-8 tracking-wider">HUSSAIN DIGITAL STUDIO</h1>

    <div class="w-full max-w-md space-y-6">
        
        <div class="glass p-6 text-center">
            <h2 class="text-white text-lg font-semibold mb-4">🖼️ ڈائنامک بیک گراؤنڈ</h2>
            <input type="text" id="countryInput" placeholder="ملک کا نام لکھیں (e.g. Dubai)" 
                   class="w-full p-3 rounded-lg bg-black/40 border border-cyan-400 text-white mb-4 outline-none">
            <button onclick="changeBackground()" 
                    class="w-full bg-cyan-500 hover:bg-cyan-600 text-black font-bold py-3 rounded-lg transition">
                بیک گراؤنڈ تبدیل کریں
            </button>
        </div>

        <div class="glass p-8 text-center">
            <h2 class="text-white text-xl font-bold mb-4">🎬 AI VIDEO GENERATOR</h2>
            <p class="text-gray-300 text-sm mb-6">اپنی ویڈیو تیار کریں اور براہِ راست گیلری میں سیو کریں۔</p>
            <button onclick="downloadVideo()" 
                    class="w-full border-2 border-cyan-400 text-white py-3 rounded-full hover:bg-cyan-400 hover:text-black font-bold transition">
                ویڈیو ڈاؤن لوڈ کریں (Real)
            </button>
        </div>

        <div class="glass p-6 text-center">
            <h2 class="text-white text-lg font-semibold mb-4">💬 اسٹوڈیو سپورٹ</h2>
            <a href="https://wa.me/923461785207" target="_blank"
               class="inline-block w-full border-2 border-green-500 text-white py-3 rounded-full hover:bg-green-500 font-bold transition">
                واٹس ایپ پر رابطہ کریں
            </a>
        </div>

    </div>

    <div class="fixed bottom-0 left-0 w-full glass flex items-center p-4">
        <img src="https://via.placeholder.com/60" alt="Hussain" class="w-14 h-14 rounded-full border-2 border-cyan-400 mr-4">
        <div>
            <p class="text-white font-bold text-lg">خوش آمدید، حسین</p>
            <p class="text-cyan-400 text-xs">#HussainDigitalStudio #OwlDigital</p>
        </div>
    </div>
</div>

<script>
    // 🖼️ بیک گراؤنڈ بدلنے کا فنکشن
    function changeBackground() {
        const query = document.getElementById('countryInput').value;
        if (query.trim() === "") {
            alert("براہ کرم کوئی نام لکھیں!");
            return;
        }
        const newUrl = `https://source.unsplash.com/featured/?${query}`;
        document.body.style.backgroundImage = `url('${newUrl}')`;
    }

    // 📥 اصلی ویڈیو ڈاؤن لوڈ فنکشن
    function downloadVideo() {
        const videoUrl = 'https://www.w3schools.com/html/mov_bbb.mp4'; // آپ یہاں اپنا اصلی ویڈیو لنک ڈال سکتے ہیں
        const link = document.createElement('a');
        link.href = videoUrl;
        link.download = 'HDS_Video.mp4';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        alert("آپ کی ویڈیو ڈاؤن لوڈ ہونا شروع ہو گئی ہے!");
    }
</script>

</body>
  </html>
